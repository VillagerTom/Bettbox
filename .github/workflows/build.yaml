name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_android:
        description: "Build Android"
        required: false
        default: true
        type: boolean
      build_mac:
        description: "Build macOS"
        required: false
        default: true
        type: boolean
      build_windows:
        description: "Build Windows"
        required: false
        default: true
        type: boolean
      build_linux:
        description: "Build Linux"
        required: false
        default: true
        type: boolean

env:
  IS_STABLE: ${{ github.ref_type == 'tag' && !contains(github.ref, '-') }}
  IS_PRERELEASE: ${{ contains(github.ref_name, 'pre') }}
  GRADLE_OPTS: -Dorg.gradle.vfs.watch=false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SENTRY_BACKEND: none

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          MATRIX='[
            {
              "platform": "android",
              "os": "ubuntu-24.04",
              "arch": "arm64"
            },
            {
              "platform": "android",
              "os": "ubuntu-24.04",
              "arch": "amd64"
            },
            {
              "platform": "android",
              "os": "ubuntu-24.04",
              "arch": "arm"
            },
            {
              "platform": "android",
              "os": "ubuntu-24.04",
              "arch": "universal"
            },
            {
              "platform": "windows",
              "os": "windows-2022",
              "arch": "amd64"
            },
            {
              "platform": "windows",
              "os": "windows-11-arm",
              "arch": "arm64"},
            {
              "platform": "windows",
              "os": "windows-2022",
              "arch": "amd64",
              "compatible": true
            },
            {
              "platform": "macos",
              "os": "macos-15",
              "arch": "arm64"
            },
            {
              "platform": "macos",
              "os": "macos-15",
              "arch": "amd64"},
            {
              "platform": "macos",
              "os": "macos-15",
              "arch": "amd64",
              "compatible": true
            },
            {
              "platform": "linux",
              "os": "ubuntu-22.04",
              "arch": "amd64"},
            {
              "platform": "linux",
              "os": "ubuntu-24.04-arm",
              "arch": "arm64"},
            {
              "platform": "linux",
              "os": "ubuntu-22.04",
              "arch": "amd64",
              "compatible": true
            }
          ]'
          FILTERED=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            FILTERED=$(echo "$MATRIX" | jq -c '[.[] | select(
              (.platform == "android" and ${{ inputs.build_android }}) or
              (.platform == "windows" and ${{ inputs.build_windows }}) or
              (.platform == "macos" and ${{ inputs.build_mac }}) or
              (.platform == "linux" and ${{ inputs.build_linux }})
            )]')
            echo "matrix=$FILTERED" >> "$GITHUB_OUTPUT"
          else
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: [setup-matrix]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Rust (Windows)
        if: matrix.platform == 'windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'arm64' && 'aarch64-pc-windows-msvc' || 'x86_64-pc-windows-msvc' }}

      - name: Enable Git long paths (Windows)
        if: matrix.platform == 'windows'
        run: git config --global core.longpaths true

      - name: Setup Keystore (Android)
        if: matrix.platform == 'android'
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties

      - name: Setup Java
        if: matrix.platform == 'android'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - name: Install Dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev ninja-build libgtk-3-dev rpm

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.compatible == true && '1.20.x' || '1.24.x' }}
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ contains(matrix.os, 'arm') && 'master' || 'stable' }}
          cache: true
          cache-key: flutter-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('**/pubspec.lock') }}
          flutter-version: ${{ contains(matrix.os, 'arm') && '' || '3.44.2' }}


      - name: Clean Gradle (Android)
        if: matrix.platform == 'android'
        run: |
          cd android
          flutter clean

      - name: Patch for Windows TUN
        if: matrix.platform == 'windows' && matrix.compatible == true
        shell: bash
        run: |
          cd core
          SING_TUN_VERSION=$(grep -E 'github\.com/metacubex/sing-tun\s+v[^[:space:]]+' go.mod | awk '{print $2}')
          echo "Detected sing-tun version: ${SING_TUN_VERSION}"
          go mod download github.com/metacubex/sing-tun@${SING_TUN_VERSION}
          MOD_CACHE=$(go env GOMODCACHE | tr '\\' '/')
          FILE="${MOD_CACHE}/github.com/metacubex/sing-tun@${SING_TUN_VERSION}/tun_windows.go"
          echo "Patching ${FILE}"
          chmod +w "${FILE}"
          perl -pi -e 's/inetIf\.ForwardingEnabled = true/inetIf.ForwardingEnabled = false/g' "${FILE}"

      - name: Build Bettbox
        shell: bash
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          flutter pub get
          dart run build_runner build -d
          dart setup.dart ${{ matrix.platform }} --arch ${{ matrix.arch }} ${{ env.IS_STABLE == 'true' && '--env stable' || '' }} ${{ matrix.compatible == true && '--compatible' || '' }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: Bettbox-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.compatible == true && '-compatible' || '' }}
          path: ./dist
          compression-level: 9
          overwrite: true

  upload:
    permissions: write-all
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download
        uses: actions/download-artifact@v7
        with:
          path: ./dist/
          pattern: Bettbox-*
          merge-multiple: true

      - name: Generate release.md
        run: |
          echo -e "- Fixes and improvements\n- 具体变更参考最新Commits" > release.md

      - name: Patch release.md
        run: |
          version=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          base_version=$(echo "$version" | sed 's/-pre[0-9]*//')
          if [ "${{ env.IS_PRERELEASE }}" == "true" ]; then
            sed -e "s|BASE_VERSION|$base_version|g" -e "s|VERSION|$version|g" ./.github/release_template_pre.md >> release.md
          else
            sed -e "s|BASE_VERSION|$base_version|g" -e "s|VERSION|$version|g" ./.github/release_template.md >> release.md
          fi

      - name: Release
        if: ${{ env.IS_STABLE == 'true' || env.IS_PRERELEASE == 'true' }}
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: ./dist/*
          body_path: './release.md'
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
